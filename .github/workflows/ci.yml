# CI pipeline — runs on every push to main/develop and on PRs to main.
# Requires all checks green before merging.
#
# IMPORTANT: After this workflow runs green, configure branch protection on `main`:
#   Settings → Branches → Add rule → "main"
#   ✓ Require status checks to pass before merging (select "build-and-test")
#   ✓ Require branches to be up to date before merging

name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: qorpera_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5432/qorpera_test
      ENCRYPTION_SECRET: test-encryption-key-minimum-32-chars-long
      NODE_ENV: test
      AI_PROVIDER: openai
      AI_API_KEY: test-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test DB
        run: npx prisma db push --skip-generate

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

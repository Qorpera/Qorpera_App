version: '3.8'

services:
  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://qorpera:qorpera_secret@postgres:5432/qorpera
      - DOCUMENT_STORAGE_PATH=/data/documents
    env_file:
      - .env
    volumes:
      - document_storage:/data/documents
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: qorpera
      POSTGRES_USER: qorpera
      POSTGRES_PASSWORD: qorpera_secret
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U qorpera"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Uncomment for local AI inference
  # ollama:
  #   image: ollama/ollama:latest
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   restart: unless-stopped

volumes:
  postgres_data:
  document_storage:
  # ollama_data:
